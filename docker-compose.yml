services:
  db_service:
    image: postgres:16-bookworm
    container_name: db_vaadin
    environment:
      POSTGRES_DB: vaadin_db
      POSTGRES_USER: vaadin_user
      POSTGRES_PASSWORD: vaadin_password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vaadin_user -d vaadin_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: vaadin_app_container
    ports:
      - "8080:8080"
    depends_on:
      db_service:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db_service:5432/vaadin_db
      - SPRING_DATASOURCE_USERNAME=vaadin_user
      - SPRING_DATASOURCE_PASSWORD=vaadin_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  postgres_data: