server.port=${PORT:8080}
logging.level.org.atmosphere=warn
spring.devtools.restart.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5432/vaadin_db
spring.datasource.username=vaadin_user
spring.datasource.password=vaadin_password

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

vaadin.launch-browser=true

vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.example
